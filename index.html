  <a href="https://sneakyuser.carrd.co">
    <button onclick="installApp()">📲 Ouvrir</button>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
    });
  } else {
    alert("Ajoute cette page à ton écran d'accueil 📲");
  }
}
</script>
