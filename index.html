<!DOCTYPE html>

<script>
function openLink(url) {
  window.open(url, "_blank");
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
